name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # 🐍 refresh twice a day
  workflow_dispatch:          # ▶️ allow manual run
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#6366F1&color_dots=#0D1117,#38BDF8,#6366F1,#8B5CF6,#ffffff

      - name: Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
