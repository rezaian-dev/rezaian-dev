<svg width="1200" height="140" viewBox="0 0 1200 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Let's build something together">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1200" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#160E33"/>
      <stop offset="0.5" stop-color="#0D1230"/>
      <stop offset="1" stop-color="#070A1A"/>
    </linearGradient>
    <linearGradient id="faccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fgrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="140" fill="url(#fbg)"/>
  <rect width="1200" height="140" fill="url(#fgrid)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#fline)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="64" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="url(#faccent)">Let’s build something users will love.</text>
  <text x="600" y="98" text-anchor="middle" font-family="'Fira Code','Courier New',monospace" font-size="14" fill="#94A3B8">Thanks for scrolling — now let’s create something amazing together ✦</text>
</svg>
