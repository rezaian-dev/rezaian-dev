<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mohammad Reza Rezaian — Front-End Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05060F"/>
      <stop offset="0.5" stop-color="#0B1030"/>
      <stop offset="1" stop-color="#130A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="nm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="auroraA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <g filter="url(#blur)">
    <circle cx="300" cy="70" r="170" fill="url(#auroraA)">
      <animate attributeName="cx" values="300;360;300" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;110;70" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="280" r="190" fill="url(#auroraB)">
      <animate attributeName="cx" values="900;840;900" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="280;240;280" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="180" r="160" fill="url(#auroraC)">
      <animate attributeName="cy" values="180;150;180" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect width="1200" height="340" fill="url(#grid)"/>

  <rect x="0" y="0" width="1200" height="3" fill="url(#line)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="337" width="1200" height="3" fill="url(#line)">
    <animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <g text-anchor="middle">
    <g transform="translate(600,68)">
      <rect x="-118" y="-18" width="236" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.05" stroke="#6366F1" stroke-opacity="0.5"/>
      <circle cx="-94" cy="0" r="5" fill="#22C55E" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="-78" y="5" text-anchor="start" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" letter-spacing="3" font-weight="600" fill="#A5F3FC">AVAILABLE FOR WORK</text>
    </g>

    <text x="600" y="172" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="1" fill="url(#nm)" filter="url(#glow)">Mohammad Reza Rezaian</text>

    <text x="600" y="226" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="2" fill="url(#accent)">Front-End Developer</text>

    <text x="600" y="262" font-family="'Fira Code','Courier New',monospace" font-size="16" fill="#94A3B8">crafting fast, accessible &amp; beautiful interfaces<tspan fill="#22D3EE"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/> _</tspan></text>
  </g>

  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">
    <g transform="translate(486,292)">
      <rect x="-46" y="0" width="92" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.06" stroke="#22D3EE" stroke-opacity="0.45"/>
      <text x="0" y="20" fill="#E2E8F0">React</text>
    </g>
    <g transform="translate(600,292)">
      <rect x="-52" y="0" width="104" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.06" stroke="#6366F1" stroke-opacity="0.45"/>
      <text x="0" y="20" fill="#E2E8F0">Next.js</text>
    </g>
    <g transform="translate(724,292)">
      <rect x="-58" y="0" width="116" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.06" stroke="#C084FC" stroke-opacity="0.45"/>
      <text x="0" y="20" fill="#E2E8F0">TypeScript</text>
    </g>
  </g>
</svg>
